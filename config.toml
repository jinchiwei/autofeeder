[general]
backend = "anthropic"
frequency = "weekly"
log_level = "INFO"
# Max profiles to run concurrently under `--all`. Each profile fans out its own
# triage/translate LLM calls, so unbounded parallelism (all profiles at once)
# can thunder the Versa gateway into a 429/504 storm. Keep `--all` parallel but
# bounded. Raise when Versa is healthy; lower if you see 504 storms.
max_concurrent_profiles = 3

[fetch]
max_items_per_feed = 50
max_total_items = 400
lookback_days = 7
concurrency = 10

[triage]
batch_size = 25
prefilter_keep_top = 200
concurrency = 4

[summarize]
enabled = true
concurrency = 3
max_content_chars = 15000
archive_ph_enabled = true
unpaywall_email = "$UNPAYWALL_EMAIL"

[output]
dir = "output"
min_score = 0.65
max_returned = 40

[anthropic]
# Bedrock model names (UCSF Versa - requires VPN/campus IP)
model = "us.anthropic.claude-opus-4-6-v1"
triage_model = "us.anthropic.claude-opus-4-6-v1"
timeout = 300

# Direct API model names (for GitHub Actions or off-campus)
# model = "claude-opus-4-6"
# triage_model = "claude-opus-4-6"

[openai]
base_url = "https://unified-api.ucsf.edu/general"
model = "gpt-5.2-2025-12-11"
timeout = 300

[local]
base_url = "http://localhost:1234/v1"
model = "qwen2.5-72b"
structured_output = false

[cross_profile]
slack_webhook = "$CROSS_PROFILE_SLACK_WEBHOOK"

[ledger]
enabled = true
path = "seen.json"
prune_after_days = 90

[sync]
# Mirror output/ into an Obsidian vault subfolder after every run.
# Leave vault_path empty to disable.
vault_path = "~/arcadia/jkw_dm"
subfolder = "臥龍/Autofeeder"

[cadence]
# Email-recipient cadence filter (applied across ALL profiles).
# Addresses in `daily_only` get every digest. Every OTHER address listed in a
# profile's outputs.email.recipients only receives mail when today's weekday
# matches `weekly_day`. Case-insensitive match.
# weekly_day accepts: monday, tuesday, wednesday, thursday, friday, saturday, sunday.
daily_only = ["mrjinch@gmail.com", "wkkwei@hotmail.com"]
weekly_day = "monday"
