# Profile: venus
# Scope: science / research / medicine that BRIDGES Western biomedicine and
# Eastern / traditional medicine — rigorous evidence applied to acupuncture,
# TCM, herbal medicine, mind-body practice; anatomical & mechanistic
# discoveries that illuminate traditional concepts; integrative care models.
# The lens is evidence-first: validating OR refuting traditional claims with
# real science, not credulous wellness content.

name = "venus"
description = "East-meets-West medicine: evidence-based integrative & traditional medicine, ethnopharmacology, mind-body science, the biology behind acupuncture / TCM / fascia."

