# Profile: neuroimaging-ai
# Scope: ML/DL applied to neuroimaging — foundation models, brain segmentation,
# registration, harmonization, multimodal (imaging × genomics × clinical),
# self-supervised / contrastive learning, generative models for MRI,
# imaging biomarkers, radiogenomics.

name = "neuroimaging-ai"
description = "ML/DL for neuroimaging: foundation models, brain segmentation, multimodal (imaging × genomics), self-supervised learning, generative models, radiogenomics."

