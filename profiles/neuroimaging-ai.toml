narrative = """
Track ML/DL research applied to neuroimaging across modalities (structural MRI, fMRI, diffusion MRI, PET) and across the methodological stack (segmentation, registration, harmonization, generative, multimodal, foundation models).

HIGH PRIORITY — score highly when they occur:
- New foundation models for medical imaging or specifically brain MRI/CT/PET. Especially open-weights releases, novel pretraining strategies on large brain imaging corpora (UK Biobank, ADNI, ENIGMA), and vision-language models trained on radiology reports + images. Examples: MedSAM, BrainSAM, RadFM, RadiologyGPT, M3D, Tx-LLM, RadDINO, BiomedCLIP for brain.
- Brain segmentation breakthroughs: new architectures (transformer-based, diffusion-based), new training paradigms (self-supervised, prompted/SAM-style), domain generalization across scanners/sites, segmentation of subtle lesions (WMH, microbleeds, microinfarcts).
- Multimodal models combining brain imaging with: genomics (imaging genomics, radiogenomics), clinical text (reports, EHR), longitudinal time-series, or molecular data (PET tracers). Especially when they enable prediction tasks that single-modality models couldn't.
- Generative models for brain MRI: diffusion models, GANs, flow-based models used for harmonization, super-resolution, modality translation, data augmentation, or counterfactual generation.
- Tool releases that change practice: MONAI updates, nnU-Net derivatives, FastSurfer/SynthSeg updates, new open-source pipelines for brain imaging analysis.
- Scaling/sample-efficiency studies: how performance scales with pretraining data size, how few-shot adapts to new sites/scanners, how foundation models transfer to neuroimaging downstream tasks.

ALSO TRACK:
- Image registration deep learning (deformable, intra-/inter-modal, atlas construction).
- Functional connectivity / brain encoding models using deep learning.
- Diffusion MRI methods (tractography, microstructure, fixel-based).
- Brain age prediction and other "biomarker" prediction tasks.
- Population-scale imaging studies (UK Biobank, ADNI, OASIS, HCP, ABCD) that apply deep learning, especially when they reveal something biological.
- Robustness, harmonization across scanners/sites, fairness across demographics.
- Uncertainty estimation, calibration, evaluation methodology for medical imaging.
- Conference proceedings from MICCAI, MIDL, IPMI, ISBI, NeurIPS, ICLR, ICML when topic-relevant (these often appear on arXiv first).
- New benchmarks and evaluation suites for medical imaging.

DE-PRIORITIZE:
- Pure NLP/LLM frontier research without an imaging component (that's the frontier-ai feed).
- General computer vision on natural images (ImageNet, COCO) unless directly transferable to medical imaging.
- Hardware reviews, gaming GPU benchmarks, consumer AI product launches.
- Pure neuroscience papers (no ML/DL component).
- Clinical case series / retrospective chart reviews without a deep learning method.
- Pure software engineering / framework release notes without methodological substance.
- Generic radiology news without research content.
"""

[overrides]
min_score = 0.55

