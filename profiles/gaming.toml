narrative = """
I want to stay on top of the gaming and PC hardware world broadly. This includes:

**Video game news and reviews**: New game announcements, reviews, Steam sales and events, Nintendo Switch and Switch 2 news, indie game coverage, and major platform updates.

**PC hardware and peripherals**: In-depth reviews and news about gaming mice (sensor technology, polling rates, wireless performance), mechanical keyboards (switch types, hot-swap boards, custom builds, keycap group buys), OLED and high-refresh-rate monitors (QD-OLED, WOLED, mini LED, response times, HDR), and other peripherals like headsets and controllers.

**Display technology**: Particularly interested in OLED monitor developments, new panel technologies, and comparative reviews from outlets like Rtings and Hardware Unboxed.

**Steam and PC platform ecosystem**: Steam Deck updates, Proton/Linux gaming compatibility, Epic/GOG news, and digital storefront developments.

**Nintendo ecosystem**: Switch game releases, first-party Nintendo announcements, hardware revisions, and the next-gen Switch.

I care about both enthusiast-level technical depth (like Gamers Nexus teardowns or Digital Foundry analysis) and broader consumer-facing news and reviews.
"""

