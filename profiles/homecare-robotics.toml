# Profile: homecare-robotics (家庭医生机器人 / home "family-doctor" robots)
# Scope: robots and embodied AI that deliver healthcare in the HOME and primary-
# care setting — home-care & eldercare robots, AI health assistants / triage
# agents, telepresence & telehealth robots, socially-assistive & companion
# robots, rehabilitation & mobility assistance, remote patient monitoring.
# Bilingual digest: Traditional Chinese on top, English below.

