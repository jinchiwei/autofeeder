narrative = """
This feed tracks the LATEST ADVANCES IN HOME / PRIMARY-CARE ROBOTS AND EMBODIED HEALTH AI — the broad idea of a "family doctor robot": systems that monitor, triage, assist, and care for people in the home or primary-care setting. The frame is real engineering + clinical evidence, not consumer-gadget hype.

SURFACE HIGH (score >= 0.70):
- New home-care, eldercare, nursing, or companion / socially-assistive robots with real capability or clinical evaluation (pilot studies, RCTs, deployments in homes / care facilities).
- AI health assistants and triage agents that act like a primary-care first contact: symptom assessment, clinical decision support, virtual nursing, conversational diagnosis — especially with validation data or regulatory milestones.
- Telepresence / telehealth robots and remote patient monitoring systems that bring clinician care into the home.
- Assistive & rehabilitation robotics for daily living: mobility assistance, exoskeletons, fall detection/prevention, physical-assistance robots, robots supporting aging-in-place and ambient assisted living.
- Foundation-model / embodied-AI advances applied to healthcare robots (vision-language-action models for care tasks, manipulation for ADLs).
- Human-robot interaction research specific to vulnerable populations (older adults, dementia care, pediatric, disability).
- Regulatory / reimbursement / health-system news that materially enables home-care robots (FDA clearances, CE marks, CMS coverage of remote monitoring).

ALSO TRACK (score 0.5-0.7):
- General medical / surgical robotics advances with plausible transfer to home or primary care.
- Wearables and home sensors feeding AI health monitoring.
- Component advances (soft robotics, tactile sensing, safe physical HRI, on-device LLM agents) clearly aimed at care robots.
- Market / deployment news from credible robotics trade press.
- Aging-society policy and workforce-shortage analyses that drive care-robot demand.

SCORE DOWN (<= 0.4) OR EXCLUDE:
- Pure industrial / warehouse / manufacturing robotics with no health angle.
- Generic LLM / chatbot news with no embodied or clinical-care dimension.
- Wellness-gadget marketing, crowdfunding hype, vaporware demos with no evaluation.
- Military / defense robotics.
- Self-driving cars and drones unless explicitly medical-delivery / home-care.
- Surgical-robot business news (e.g. routine da Vinci procedure counts) with no advance.

DEFAULTS:
- Favor work with evaluation data, deployment, or a clear path into the home / primary care over flashy lab demos.
- A rigorous null result (a care robot that did NOT help) is still signal — surface it.
"""

[overrides]
min_score = 0.50

