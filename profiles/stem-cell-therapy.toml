# Profile: stem-cell-therapy (干细胞临床治疗 / clinical stem-cell therapy)
# Scope: clinical translation of stem-cell & regenerative medicine — cell
# therapies in trials and the clinic (iPSC, ESC, MSC / mesenchymal stromal,
# HSC), organoid- and tissue-engineering therapeutics, regenerative repair,
# plus the manufacturing / regulatory / safety story behind getting cells into
# patients. Bilingual digest: Traditional Chinese on top, English below.

name = "stem-cell-therapy"
description = "Latest advances in clinical stem-cell therapy & regenerative medicine: cell-therapy trials (iPSC/ESC/MSC/HSC), organoids and tissue engineering, manufacturing, safety, and regulatory milestones."

