    "stem cell therapy",
    "regenerative medicine",
    "cell therapy",
    "induced pluripotent stem cell",
    "iPSC",
    "embryonic stem cell",
    "mesenchymal stem cell",
    "mesenchymal stromal cell",
    "hematopoietic stem cell",
    "neural stem cell",
    "organoid",
    "tissue engineering",

    # Clinical translation
    "clinical trial",
    "first-in-human",
    "cell transplantation",
    "autologous",
    "allogeneic",
    "regenerative repair",
    "stem cell transplant",
    "advanced therapy medicinal product",
    "cell manufacturing",
    "GMP cell",
    "off-the-shelf cell",

    # Therapeutic areas
    "spinal cord injury repair",
    "Parkinson cell therapy",
    "macular degeneration cell",
    "type 1 diabetes islet",
    "cartilage repair",
    "heart regeneration",
    "graft versus host",
    "bone marrow transplant",

    # Safety / regulatory
    "teratoma",
    "tumorigenicity",
    "cell therapy safety",
    "FDA cell therapy",
    "stem cell tourism",
]

narrative = """
This feed tracks the LATEST ADVANCES IN CLINICAL STEM-CELL THERAPY AND REGENERATIVE MEDICINE — moving cells from bench to patient. Emphasis on clinical translation: trials, first-in-human results, manufacturing, safety, and regulation, plus the foundational science that enables them.

SURFACE HIGH (score >= 0.70):
- Clinical trials of stem-cell / regenerative therapies: first-in-human, phase I-III results, new INDs, regulatory approvals (FDA / EMA / PMDA). iPSC-, ESC-, MSC/stromal-, HSC-, and neural-stem-cell-based therapies.
- Landmark therapeutic-area progress: iPSC-derived dopaminergic neurons for Parkinson's, RPE cells for macular degeneration, islet / beta-cell therapy for type 1 diabetes, cell therapy for spinal cord injury, cartilage / bone / cardiac regeneration, HSC transplant advances, GvHD.
- Organoid- and tissue-engineering therapeutics with a translational path (transplantable tissues, bioprinted constructs going toward the clinic).
- Cell-manufacturing and delivery advances that unlock therapies: GMP scale-up, off-the-shelf / allogeneic "universal" cells, hypoimmunogenic engineering, potency assays, cryopreservation, in-vivo reprogramming.
- Safety & rigor: tumorigenicity / teratoma risk, long-term follow-up, and HONEST negative or null trial results.
- Mechanistic stem-cell biology that directly enables therapy (reprogramming, differentiation protocols, stemness, niche control).

ALSO TRACK (score 0.5-0.7):
- Preclinical / animal-model regenerative results with a clear clinical rationale.
- Policy, funding, and ethics news on stem-cell / regenerative medicine (ISSCR guidelines, reimbursement, right-to-try).
- Biotech / company milestones (financing tied to a specific clinical program, partnerships) when there's real scientific substance.
- Adjacent engineered-cell therapies (CAR-based) ONLY when the angle is stem-cell-derived or regenerative, not pure oncology immunotherapy.

SCORE DOWN (<= 0.4) OR EXCLUDE:
- Unproven "stem cell clinic" / stem-cell-tourism marketing, supplement or cosmetic "stem cell" products — UNLESS the article is a rigorous expose / regulatory crackdown.
- Pure cancer immunotherapy (CAR-T for lymphoma) with no regenerative / stem-cell dimension.
- Basic developmental biology with no therapeutic line of sight.
- Hype press releases with no data, vague "breakthrough" claims.
- General gene-therapy news unless it intersects stem / regenerative cells.

DEFAULTS:
- Weight clinical-stage evidence and manufacturing/safety substance over early preclinical buzz.
- An honest failed or null trial is HIGH signal — surface it.
- When unsure if a CAR / gene therapy belongs here, ask: is the therapeutic a stem / progenitor / regenerative cell? If no, score down.
"""

[overrides]
min_score = 0.50

