narrative = """
I manage and develop on GitHub Enterprise Server (GHES) and want to stay current on the full GitHub ecosystem. My interests include:

1. **GHES administration**: Upgrades, patches, security advisories, backup strategies, clustering, authentication (SAML, LDAP), performance tuning, and infrastructure best practices.

2. **GitHub Actions**: New features, self-hosted runner updates, reusable workflows, composite actions, CI/CD patterns, security hardening for Actions, and workflow optimization.

3. **AI agents and Copilot**: GitHub Copilot updates, Copilot Extensions, AI-powered code review, AI agents that integrate with GitHub (Claude Code, Codex, Aider), MCP servers for GitHub, and automated PR workflows.

4. **Security**: GitHub Advanced Security (GHAS), CodeQL, Dependabot, secret scanning, code scanning, supply chain security, and vulnerability advisories affecting GitHub or GHES.

5. **API and integrations**: GitHub REST/GraphQL API changes, GitHub Apps, webhooks, GitHub CLI updates, and third-party integrations.

6. **Platform updates**: New GitHub features, GitHub Changelog entries, GitHub blog posts about engineering practices, and community-discovered tips.

Prioritize GHES-specific content, security advisories, and AI agent integrations. Score GitHub Changelog entries and GHES release notes highly. Community tips about Actions optimization or Copilot workflows are also valuable.
"""

[overrides]
min_score = 0.40

