narrative = """
I am researching the intersection of neuroimaging and genomics in Alzheimer's disease. My primary interests include:

1. **MRI biomarkers**: Structural and functional MRI findings that can serve as early indicators or progression markers for Alzheimer's, including hippocampal atrophy, cortical thinning, white matter changes, and resting-state connectivity alterations.

2. **Molecular imaging**: PET imaging with amyloid and tau tracers, and how these relate to MRI-detectable changes and genetic risk.

3. **Genomics and genetics**: GWAS findings, polygenic risk scores, APOE variants, and rare genetic mutations (APP, PSEN1, PSEN2) — particularly how genetic factors influence imaging phenotypes (imaging-genetics).

4. **Fluid biomarkers**: CSF and blood-based biomarkers (Aβ42/40 ratio, p-tau, NfL) and their correlation with imaging findings.

5. **Translational research**: Studies bridging basic science discoveries to clinical applications, including early detection strategies, clinical trial design using imaging endpoints, and precision medicine approaches.

6. **AI and computational methods**: Deep learning, machine learning, and other AI approaches applied to Alzheimer's research — automated classification (AD vs MCI vs healthy), brain age prediction, radiomics, explainable AI for neuroimaging, graph neural networks for brain connectivity, and AI-driven drug discovery or clinical trial optimization.

I want to stay current on both cutting-edge research and clinical developments, from large cohort studies (ADNI, UK Biobank) to novel computational methods for image analysis and genetic data integration. Papers applying novel AI/ML methods to AD data should be scored highly even if the primary contribution is methodological rather than clinical.
"""

