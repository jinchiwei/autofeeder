narrative = """
I am a materials scientist interested in non-viral DNA and nucleic acid delivery. My primary interests include:

1. **Polymer nanoparticles and polyplexes**: Design, synthesis, and characterization of polymeric carriers for DNA, mRNA, and siRNA delivery. This includes polyethylenimine (PEI), poly(beta-amino esters) (PBAEs), dendrimers, block copolymers, and novel polymer architectures for gene delivery.

2. **Coacervates**: Complex coacervation for nucleic acid encapsulation, charge-driven self-assembly, and coacervate-based delivery systems.

3. **High-throughput screening**: Combinatorial approaches to nanoparticle formulation, microfluidic synthesis, automated screening platforms, and machine learning-guided materials discovery for optimizing delivery vehicles.

4. **Nanomedicine fundamentals**: Endosomal escape mechanisms, intracellular trafficking, biodistribution, organ-selective targeting, and in vivo performance of non-viral delivery systems.

5. **Gene therapy applications**: CRISPR/Cas9 delivery, base editing, prime editing, and other gene editing tools delivered via non-viral carriers. Clinical translation of polymer-based gene therapies.

6. **Characterization and formulation**: DLS, zeta potential, cryo-EM of nanoparticles, encapsulation efficiency, stability, and scalable manufacturing of polymer nanoparticles.

Prioritize papers that introduce novel polymer chemistries, new screening methodologies, or demonstrate significant improvements in delivery efficiency. Papers combining machine learning with materials screening should be scored highly.
"""

