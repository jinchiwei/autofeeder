narrative = """
I am researching meningiomas — the most common primary intracranial tumor — with interests spanning clinical, molecular, and AI-driven research. Specifically:

1. **Molecular classification**: Driver mutations (NF2, TRAF7, KLF4, AKT1, SMO, PIK3CA, POLR2A, SMARCB1), DNA methylation-based subtyping (DKFZ classifier, integrated grading), chromosomal alterations (1p, 22q, 14q loss), and how molecular subtype predicts recurrence and response to therapy. Papers advancing the CNS WHO 2021 classification or its successors should be scored highly.

2. **Imaging biomarkers**: Multiparametric MRI, advanced MR techniques (perfusion, diffusion, spectroscopy), and somatostatin-receptor PET (68Ga-DOTATATE) for grading, recurrence detection, and radiotherapy planning. Peritumoral edema, brain invasion, and skull-base involvement as imaging biomarkers.

3. **Surgical outcomes**: Extent of resection (Simpson grading), skull-base approaches, recurrence after gross total vs subtotal resection, and intraoperative adjuncts (neuronavigation, 5-ALA, neuromonitoring).

4. **Radiation therapy**: Stereotactic radiosurgery (Gamma Knife, CyberKnife, LINAC), fractionated radiotherapy, proton therapy — dose, fractionation, target delineation, and long-term outcomes including radiation-induced complications.

5. **AI / ML in meningioma research**: Automated segmentation, radiomics signatures for grade prediction, recurrence prediction models, deep learning classifiers, methylation-from-MRI prediction, treatment response prediction. Methodological contributions that push the state of medical image analysis on meningioma cohorts should be scored highly even when not yet clinically deployed.

6. **Medical therapy & liquid biopsy**: Trials of bevacizumab, mTOR inhibitors, SMO inhibitors, and emerging targeted agents; cfDNA / methylation-based liquid biopsies for recurrence monitoring.

7. **Related entities**: Solitary fibrous tumor / hemangiopericytoma (formerly considered meningeal), atypical and anaplastic variants, pediatric meningioma, radiation-induced meningioma.

Down-weight pure case reports without molecular/imaging/AI content, purely veterinary studies, and papers where meningioma is mentioned only as a differential but is not the subject of the paper.
"""

