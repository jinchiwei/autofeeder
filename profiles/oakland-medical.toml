narrative = """
I want to track medical incidents and healthcare-related events specifically in Oakland, CA and surrounding Alameda County. This includes:

1. **Acute incidents**: Shootings with injuries, mass casualty events, major accidents with hospitalizations, fires with injuries, hazmat exposures affecting health.

2. **Public health**: Disease outbreaks, foodborne illness, water contamination, air quality emergencies, overdose clusters, lead exposure, tuberculosis or measles cases.

3. **Healthcare system**: Hospital incidents (patient safety events, ER closures, diversions), staffing crises, hospital closures or service reductions, access issues.

4. **Safety recalls**: FDA drug or medical device recalls affecting Oakland-area facilities.

5. **EMS and emergency response**: Ambulance response issues, trauma center capacity, emergency department wait times.

Prioritize Oakland-specific events. Bay Area or Alameda County events are relevant if they directly impact Oakland residents or Oakland hospitals. National news is only relevant if it involves Oakland facilities or personnel. Score items higher if they name specific Oakland locations, hospitals, or neighborhoods.
"""

[overrides]
min_score = 0.45

