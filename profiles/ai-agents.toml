narrative = """
I use AI coding agents daily (Claude Code, Codex) and want to stay on top of this fast-moving ecosystem. I care about:

1. **Agent tools and releases**: New versions of Claude Code, Codex CLI, Cursor, Windsurf, Aider, Continue, and similar tools. Feature announcements, breaking changes, new capabilities.

2. **Plugins, skills, and extensions**: Things like gstack, superpowers, MCP servers, Claude Code plugins, custom slash commands, hooks, and agent customization. The layer on top of the base tools.

3. **Techniques and workflows**: Prompt engineering for coding agents, subagent-driven development, TDD with AI, plan-and-execute patterns, code review workflows, QA automation. How people are actually using these tools effectively.

4. **Infrastructure**: Model Context Protocol (MCP), tool use / function calling, agent SDKs, agent protocols, multi-agent orchestration. The plumbing that makes agents work.

5. **Community discoveries**: Tips, tricks, and workflows shared on Reddit, Hacker News, Twitter/X. What power users are figuring out.

6. **Research**: Papers on code generation, autonomous agents, program synthesis, AI-assisted software engineering. Academic work that will influence tools.

Prioritize practical, actionable content over hype. A blog post showing a novel Claude Code workflow is more valuable than a press release about an AI startup raising money. Score highly: new tool releases, workflow innovations, MCP servers, and community-discovered techniques.
"""

