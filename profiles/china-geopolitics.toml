narrative = """
Track Chinese domestic politics, CCP leadership dynamics, US-China strategic competition, and regional security developments across the Taiwan Strait, South China Sea, and broader Indo-Pacific.

HIGH PRIORITY — score highly when they occur:
- NPC and CPPCC "Two Sessions" coverage (annually in March): Government Work Reports, budget announcements, GDP targets, defense spending figures, Five-Year Plan updates, personnel appointments. These set China's policy direction for the year.
- CCP Central Committee plenums and Politburo Standing Committee decisions — especially leadership reshuffles, purges, or unexpected personnel changes (like the 2023 defense minister disappearance pattern).
- US-China summits, bilateral diplomatic meetings, and any direct communication between heads of state or senior officials. Score very highly for any Xi-Biden or Xi-Trump interactions.
- Taiwan Strait military provocations: PLA exercises, ADIZ incursions, carrier group deployments, missile tests near Taiwan, and any US arms sales to Taiwan or transit of US warships through the Taiwan Strait.
- Semiconductor export control actions: US Commerce Department / BIS entity list additions, new chip export restrictions, Dutch/Japanese ASML-related export controls, and Chinese countermeasures or domestic chip breakthroughs.
- South China Sea military incidents: confrontations between Chinese coast guard/navy and Philippine, Vietnamese, or other ASEAN vessels; island-building activity; freedom of navigation operations by US or allied navies.
- AUKUS and Quad developments: submarine deal milestones, joint military exercises, technology sharing agreements, and ministerial-level meetings.
- Sanctions and counter-sanctions: US sanctions on Chinese officials/entities (especially related to Xinjiang, Hong Kong, or military), Chinese retaliatory sanctions, and any EU sanctions coordination.

ALSO TRACK:
- Belt and Road Initiative developments: major infrastructure deals, debt restructuring in BRI countries, BRI summits, and any significant project cancellations or pivots.
- Hong Kong political developments: national security law prosecutions, media closures, electoral changes, and international responses.
- Xinjiang-related developments: forced labor supply chain actions, UN reports, corporate divestment decisions.
- PLA military modernization: new weapons systems, nuclear warhead estimates, space and cyber capabilities, defense white papers.
- Chinese economic indicators that have geopolitical implications: GDP growth, property sector crises, youth unemployment, trade surplus data, rare earth export controls.
- Think tank analysis and long-form assessments from CSIS, Brookings, Carnegie, RAND, and Lowy — these provide essential context for interpreting events.
- Cross-strait economic ties: trade data, investment flows, tourism restrictions.

De-prioritize: routine consular notices, cultural exchange events without political significance, individual business deals without strategic implications, generic Asia tourism content, and semiconductor news that is purely consumer/retail focused (e.g., GPU gaming benchmarks) with no geopolitical or supply chain dimension.
"""

