# Profile: agentic-tools
# Scope: tools and meta-tools for agentic / AI-assisted development — terminal
# multiplexers for AI agents, agent CLIs, AI IDEs, MCP ecosystem, productivity
# tools that orbit this work (tiling window managers, PKM / second-brain
# tooling, etc.). Excludes generic LLM news + routine version bumps.

name = "agentic-tools"
description = "Tools for agentic development: gstack, superpowers, warp, cmux, aerospace, feynman, MCP servers, AI IDEs, PKM/Obsidian, plus MAJOR Claude/Codex updates only."

# No paywalled blogs in this space — most updates are GitHub releases, dev
# blogs, HN, Lobsters. Empty list is fine; LLM still gets full RSS summaries.
paywalled_domains = []

[feeds]
list = [
    # === GitHub releases for the named tools (firehose, narrative scores down routine bumps) ===
    "gstack releases | https://github.com/garrytan/gstack/releases.atom",
    "Superpowers releases | https://github.com/obra/superpowers/releases.atom",
    "cmux releases | https://github.com/manaflow-ai/cmux/releases.atom",
    "AeroSpace releases | https://github.com/nikitabobko/AeroSpace/releases.atom",
    "Claude Code releases | https://github.com/anthropics/claude-code/releases.atom",
    "Codex CLI releases | https://github.com/openai/codex/releases.atom",
    "Aider releases | https://github.com/Aider-AI/aider/releases.atom",
    "Cline releases | https://github.com/cline/cline/releases.atom",
    "Continue releases | https://github.com/continuedev/continue/releases.atom",
    "OpenCode releases | https://github.com/sst/opencode/releases.atom",
    "Sourcegraph Amp releases | https://github.com/sourcegraph/amp/releases.atom",
    "Goose releases | https://github.com/block/goose/releases.atom",
    "Roo Code releases | https://github.com/RooCodeInc/Roo-Code/releases.atom",

    # === Official blogs (filtered toward MAJOR announcements via narrative) ===
    "Anthropic News | https://www.anthropic.com/news/rss.xml",
    "Anthropic Research | https://www.anthropic.com/research/rss.xml",
    "Cursor Blog | https://www.cursor.com/blog/rss.xml",
    "Warp Blog | https://www.warp.dev/blog/rss.xml",

    # === Individual voices that consistently surface real tools (not noise) ===
    "Simon Willison | https://simonwillison.net/atom/everything/",
    "Andrej Karpathy | https://karpathy.github.io/feed.xml",

    # === Newsletters / podcasts that cover this space ===
    "Latent Space | https://www.latent.space/feed",
    "Pragmatic Engineer | https://newsletter.pragmaticengineer.com/feed",

    # === Tech-press coverage of the agentic-tooling space ===
    "The New Stack | https://thenewstack.io/feed/",

    # === Hacker News — focused queries, high-points threshold to filter noise ===
    "HN — AI coding tools | https://hnrss.org/newest?q=ai+coding+tool+OR+coding+agent+OR+ai+ide&points=100",
    "HN — MCP & agent infra | https://hnrss.org/newest?q=mcp+server+OR+model+context+protocol+OR+agent+framework&points=75",
    "HN — terminal / CLI tools | https://hnrss.org/newest?q=terminal+OR+tui+OR+cli+tool+OR+tmux&points=100",
    "HN — second brain / PKM | https://hnrss.org/newest?q=second+brain+OR+pkm+OR+obsidian&points=75",

    # === Lobsters — devtools-tagged + AI-tagged ===
    "Lobsters — devtools | https://lobste.rs/t/devtools.rss",
    "Lobsters — ai | https://lobste.rs/t/ai.rss",

    # === Obsidian / PKM ecosystem (concept-relevant per user's interest) ===
    "Obsidian Releases | https://github.com/obsidianmd/obsidian-releases/releases.atom",
    "r/ObsidianMD — top week | https://www.reddit.com/r/ObsidianMD/top/.rss?t=week",
]

[interests]
# Atomic terms for the substring-match prefilter. Substrings only — phrases
# fine, but each item must be a literal string the prefilter can find in
# titles + RSS summaries. Concepts only — no specific tool / brand names, so
# the profile doesn't go stale as the landscape shifts. New tools surface
# organically via descriptive posts that match the narrative's categories.
keywords = [
    # === Agent / coding-assistant concepts ===
    "AI coding agent",
    "coding agent",
    "agentic coding",
    "agentic development",
    "agent loop",
    "agent SDK",
    "agent framework",
    "agent orchestration",
    "subagent",
    "AI IDE",
    "AI pair programming",
    "headless coding",
    "autonomous agent",
    "vibecoding",
    "vibe coding",

    # === Agent / tool-use protocol concepts ===
    "MCP",
    "Model Context Protocol",
    "MCP server",
    "MCP client",
    "tool use",
    "tool calling",
    "computer use",
    "skill",
    "slash command",

    # === Terminal / window / dev-environment concepts ===
    "tiling window manager",
    "terminal multiplexer",
    "TUI",
    "developer experience",

    # === Brain-building / PKM concepts ===
    "second brain",
    "PKM",
    "knowledge management",
    "note-taking",
    "personal knowledge",
    "knowledge graph",
    "zettelkasten",
]

narrative = """
This feed is about TOOLS, not about LLM frontier news. The goal: surface software that makes agentic coding better, enables AI to be used in new ways for development, or augments a thinking/building workflow (terminal stack, window manager, second brain). NOT about model benchmarks, RLHF papers, or LLM safety debates — that's the frontier-ai feed.

Important: NO specific brand or product names appear in the keyword list or this narrative. Score items by *category fit* — does the thing being discussed belong in the buckets below? — not by name match. New tools should rise organically when they're described well; established tools surface via their own GitHub releases feeds (already subscribed).

SURFACE HIGH (score ≥ 0.70):
- A new tool — CLI, IDE plugin, desktop app, agent runner, MCP server — built to make agentic coding better. Especially when the post describes what it does and why it's different (a concrete capability, workflow, or design choice), not just "we launched". Brand-new niche tools count: score the *idea*, not the recognition.
- New MCP servers — especially ones that unlock a *class* of capability (browser control, note-taking / second-brain access, calendar, code review, sandbox / eval, database introspection). Even small / one-person MCP server releases qualify if the capability is novel.
- Novel patterns / workflows for agentic dev: skill / slash-command setups, multi-agent orchestration, subagent-driven dev, agent loops, headless agent infra, sandbox / eval architectures, prompt-cache strategies, agent-aware version control. Patterns are worth as much as tools.
- Honest builder writeups: "I built X this weekend and here's what broke," "we moved our team to Y and here are the failure modes," workflow tours with screenshots / repos. Prefer specifics over abstract opinion pieces.
- Productivity stack pieces that pair with agentic coding: tiling window managers, terminal stacks (alt-shells, GPU-accelerated terminals, multiplexers), keyboard-driven launchers, note-taking apps with agent-aware features.
- PKM / second-brain workflows that are clearly agent-adjacent: daily review automation, note synthesis via LLMs, knowledge-graph extraction, agent-driven study / research workflows.

ALSO TRACK (score 0.5-0.7):
- Substantive blog posts from tool makers explaining a design decision, capability, or roadmap shift — even when the tool itself is well-known.
- Tutorials / walkthroughs that teach a new technique, not just rehash an announcement.
- Lobsters / HN discussion threads where comments add real signal beyond the headline (especially when commenters share their own workflows).
- Plugin / extension releases for note-taking apps when they're agent-aware or knowledge-graph-related (not generic UI tweaks).
- Conference talks / podcast episodes where a builder demos something concrete.

SCORE DOWN (≤ 0.4) OR EXCLUDE:
- Routine version-bump release notes — a coding agent or AI IDE shipping a `vX.Y.Z` with bullet-point bug fixes and no headline capability. SCORE LOW unless the release adds a major capability (new model, new sandboxing / computer-use paradigm, new install method, new agent loop, new MCP capability, new computer-use leap). The micro-version-bump firehose is the noise to filter out.
- Generic LLM news: new model size, benchmark scores, foundation-model releases, RLHF / alignment papers, AI safety debates, vendor pricing changes. Those belong in frontier-ai.
- Hardware reviews, GPU benchmarks, datacenter / inference cost analysis.
- "Which AI coding tool is best" ranking opinion pieces without a concrete new tool, pattern, or insight.
- AI hype takes ("this changes everything"), AGI timelines, doomer / accelerationist debates.
- Generic productivity advice not tied to a tool or workflow ("how to focus").

MAJOR EXCEPTIONS that DO belong:
- A major release from any agent CLI / AI IDE / coding-assistant platform that introduces a substantive new capability — new model architecture for agent use, new MCP capability, native installer redesign, computer-use leap, sandbox model. The dividing line: "would I want to install this immediately?" yes = surface; no = noise.
- A new platform-level announcement that introduces a primitive the wider agent ecosystem will build on (e.g., a new tool-use protocol, a new computer-use API, a new agent-memory API, a new skills / plugin standard).

DEFAULTS:
- When in doubt about a tool you've never heard of, score ~0.5 and let the LLM brief explain what it is. Better to surface a new thing once than miss it.
- Score by what the item actually describes, not by superficial keyword match. A generic post that happens to mention an agent-CLI tool in passing should NOT score high; a post that genuinely describes a new agentic-coding workflow / tool SHOULD score high even if it doesn't trigger any keyword.
"""

[overrides]
min_score = 0.50

[outputs.email]
from = "autofeeder <autofeeder@mail.jinchiwei.com>"
recipients = ["mrjinch@gmail.com", "curtis.chambers@berkeley.edu"]
