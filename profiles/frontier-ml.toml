narrative = """
I track frontier ML/DL research at the cutting edge. I care about:

1. **New architectures and training methods**: Novel model architectures (beyond standard transformers), new attention mechanisms, state space models, mixture of experts, and fundamental advances in how models learn. Papers that introduce genuinely new ideas, not incremental improvements.

2. **Scaling and efficiency**: Scaling laws, compute-optimal training, distillation, quantization, efficient inference, long-context methods. How do we make models bigger, cheaper, and faster?

3. **Reasoning and capabilities**: Chain-of-thought, test-time compute, tool use, planning, code generation, mathematical reasoning. Breakthroughs in what models can actually do.

4. **Multimodal and generative**: Vision-language models, video understanding, diffusion models, world models, embodied AI. Cross-modal understanding and generation.

5. **Alignment and interpretability**: RLHF, DPO, constitutional AI, mechanistic interpretability, superalignment. How do we understand and steer these systems?

6. **Benchmarks and evaluations**: New benchmarks, SOTA results, capability evaluations, failure mode analysis. Rigorous measurement of progress.

I want to catch the papers and blog posts that the ML research community will be talking about. Prioritize novelty and significance over volume. A single paper introducing a new paradigm is worth more than 10 incremental improvements. Score highly: new architectures, surprising empirical results, compelling theoretical insights, and major open-source releases.
"""

[overrides]
min_score = 0.60

