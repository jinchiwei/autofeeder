narrative = """
This feed tracks the LATEST ADVANCES IN NANO TRADITIONAL-CHINESE-MEDICINE RESEARCH — where nanotechnology meets TCM / herbal therapeutics. The core idea: using nanocarriers and nanonization to solve the classic problems of natural / herbal actives (poor solubility, low bioavailability, fast clearance, off-target toxicity), and to deliver TCM compounds or whole formulas more effectively. Evidence-first: real pharmacology and mechanism, not wellness marketing.

SURFACE HIGH (score >= 0.70):
- Nano drug-delivery systems for herbal / TCM actives: liposomes, polymeric or lipid nanoparticles, micelles, nanoemulsions, exosomes, self-assembling carriers loaded with curcumin, resveratrol, berberine, artemisinin, ginsenosides, tanshinone, baicalein, quercetin, paclitaxel-class natural compounds, etc. — with pharmacokinetic / efficacy / targeting data.
- Nanonization / formulation that improves bioavailability, controlled release, or tumor / tissue targeting of poorly-soluble natural products.
- Nano-formulation of whole TCM formulas or multi-component herbal extracts; "nano-TCM" / herbal-nanomedicine engineering.
- Mechanistic pharmacology of nano-delivered natural compounds (PK/PD, biodistribution, target engagement) and rigorous in-vivo efficacy.
- Nanotoxicity / safety / quality-control work specific to nano-herbal products.
- Reviews or methods that genuinely advance the nano-phytomedicine field.

ALSO TRACK (score 0.5-0.7):
- General nanomedicine / drug-delivery advances clearly transferable to natural-product or herbal payloads.
- Ethnopharmacology / phytochemistry isolating or validating a natural active that is a strong nano-delivery candidate (poor solubility, promising bioactivity).
- Tumor-targeting, oral-delivery, or blood-brain-barrier nanocarrier advances relevant to herbal actives.
- Standardization, characterization, and regulatory discussion of nano-herbal products.

SCORE DOWN (<= 0.4) OR EXCLUDE:
- Pure synthetic-drug nanomedicine with no natural-product / herbal angle (just regular pharma nanoparticles).
- Pure phytochemistry / TCM pharmacology with NO nano / delivery dimension — that's a venus-style story, not this feed.
- Materials-science nanotech with no biomedical / delivery application.
- Wellness / supplement marketing, "nano detox", colloidal-silver-style pseudoscience, unvalidated product promotion.
- Credulous "ancient herb cures cancer" content with no rigorous nano-pharmacology.

DEFAULTS:
- The sweet spot is the GENUINE INTERSECTION: a nanocarrier OR nanonization applied to a natural / herbal / TCM active, with real pharmacology. Score that highest.
- If a paper is only-nano or only-herbal (not both), score in the 0.4-0.6 band unless it's a strong delivery candidate or method.
- Honest negative results (a nano-herbal formulation that did not improve outcomes) are still signal.
"""

[overrides]
min_score = 0.50

