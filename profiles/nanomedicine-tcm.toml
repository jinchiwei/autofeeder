# Profile: nanomedicine-tcm (纳米中药 / nano traditional Chinese medicine)
# Scope: the intersection of NANOTECHNOLOGY and TRADITIONAL CHINESE / herbal
# MEDICINE — nano drug-delivery of herbal actives and TCM formulas, nano-
# phytomedicine, nanonization of poorly-soluble natural compounds, nano-
# carriers (liposomes, polymeric / lipid NPs, micelles, exosomes) for botanical
# therapeutics, and the pharmacology / safety behind them. Evidence-first lens.
# Bilingual digest: Traditional Chinese on top, English below.

